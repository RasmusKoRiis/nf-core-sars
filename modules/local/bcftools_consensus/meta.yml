name: bcftools_consensus
description: Build a consensus FASTA from a VCF and optional mask BED with bcftools consensus
keywords:
  - bcftools
  - consensus
  - vcf
  - fasta
  - mask
tools:
  - bcftools:
      description: Tools for manipulating variant calls in VCF and BCF format.
      homepage: https://samtools.github.io/bcftools/
      documentation: https://samtools.github.io/bcftools/bcftools.html
input:
  - meta:
      type: map
      description: Groovy map containing sample information.
  - vcf:
      type: file
      description: Variant call file used to build the consensus.
  - mask_bed:
      type: file
      description: BED file with regions to mask in the consensus.
  - reference:
      type: file
      description: Reference FASTA file.
output:
  - meta:
      type: map
      description: Groovy map containing sample information.
  - bcft_consensus:
      type: file
      description: Consensus FASTA generated by bcftools consensus.
      pattern: "*.consensus.fasta"
  - bcft_report_consensus:
      type: file
      description: Consensus FASTA emitted for downstream report aggregation.
      pattern: "*.consensus.fasta"
  - versions:
      type: file
      description: File containing software versions.
      pattern: "versions.yml"
authors:
  - "@RasmusKRiis"
