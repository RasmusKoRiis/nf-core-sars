name: irma
description: Assemble consensus, alignment, and QC outputs with IRMA for Nanopore SARS-CoV-2 reads
keywords:
  - irma
  - nanopore
  - consensus
  - vcf
  - bam
tools:
  - irma:
      description: Iterative Refinement Meta-Assembler.
      homepage: https://wonder.cdc.gov/amd/flu/irma/
      documentation: https://wonder.cdc.gov/amd/flu/irma/
input:
  - meta:
      type: map
      description: Groovy map containing sample information.
  - fastq:
      type: file
      description: Input FASTQ file for a single sample.
output:
  - meta:
      type: map
      description: Groovy map containing sample information.
  - fasta:
      type: file
      description: FASTA outputs produced by IRMA.
      pattern: "*.fasta"
  - bam:
      type: file
      description: BAM alignment and index generated by IRMA.
      pattern: "*.bam"
  - vcf:
      type: file
      description: VCF output generated by IRMA.
      pattern: "*.vcf"
  - read_count:
      type: file
      description: Read count summary table.
      pattern: "tables/READ_COUNTS.txt"
  - figures:
      type: file
      description: PDF figures generated by IRMA.
      pattern: "figures/*.pdf"
  - amended_consensus:
      type: file
      description: Amended consensus FASTA file.
      pattern: "amended_consensus/*.fa"
  - amended_consensus_report:
      type: file
      description: Amended consensus FASTA emitted for downstream report aggregation.
      pattern: "amended_consensus/*.fa"
  - secondary:
      type: directory
      description: IRMA secondary output directory.
      pattern: "secondary"
  - versions:
      type: file
      description: File containing software versions.
      pattern: "versions.yml"
authors:
  - "@RasmusKRiis"
