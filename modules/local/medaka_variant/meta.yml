name: medaka_variant
description: Call variants from Nanopore BAM alignments with medaka
keywords:
  - medaka
  - nanopore
  - variants
  - vcf
  - bam
tools:
  - medaka:
      description: Consensus and variant calling for Oxford Nanopore sequencing data.
      homepage: https://github.com/nanoporetech/medaka
      documentation: https://github.com/nanoporetech/medaka
input:
  - meta:
      type: map
      description: Groovy map containing sample information.
  - bam:
      type: file
      description: Input BAM alignment file.
  - bai:
      type: file
      description: Index for the BAM alignment.
  - reference:
      type: file
      description: Reference FASTA file.
  - medaka_model:
      type: string
      description: Medaka model name used for variant calling.
output:
  - meta:
      type: map
      description: Groovy map containing sample information.
  - medaka_var:
      type: file
      description: Compressed VCF and index generated by medaka.
      pattern: "*.vcf.gz"
  - versions:
      type: file
      description: File containing software versions.
      pattern: "versions.yml"
authors:
  - "@RasmusKRiis"
